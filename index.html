<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>艾尔德兰大陆 · NPC系统 · 外观影响</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0604; font-family: 'Georgia', 'Times New Roman', serif; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 6px; background-image: radial-gradient(ellipse at 30% 20%, #1a0e06 0%, #050201 70%); }
    .game-container { max-width: 1400px; width: 100%; background: #1a1009; background-image: linear-gradient(160deg, #24140a 0%, #0d0603 100%); border: 3px solid #8a6a4a; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.9); padding: 8px; color: #e8d5b5; }
    .main-layout { display: flex; gap: 6px; flex-wrap: wrap; }
    .map-panel { flex: 2; min-width: 600px; height: 680px; background: #0d0501; border: 2px solid #5a3a20; border-radius: 12px; position: relative; overflow: hidden; }
    .map-container { width: 100%; height: 100%; position: relative; overflow: auto; background: #0a0301; background-image: radial-gradient(circle at 20% 30%, #1a2a0a 1px, transparent 1px),radial-gradient(circle at 50% 40%, #1a0a2a 1px, transparent 1px),radial-gradient(circle at 70% 25%, #2a1a0a 1px, transparent 1px); background-size: 50px 50px,70px 70px,60px 60px; }
    .map-inner { width: 1800px; height: 1400px; position: relative; }
    .terrain { position: absolute; border-radius: 25px; opacity: 0.1; pointer-events: none; z-index: 1; }
    .terrain-label { position: absolute; font-size: 18px; font-weight: bold; pointer-events: none; z-index: 2; color: rgba(200,180,150,0.35); letter-spacing: 3px; }
    .map-location { position: absolute; z-index: 10; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 3px; white-space: nowrap; padding: 2px 5px; border-radius: 8px; background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.2); }
    .map-location:hover { transform: scale(1.15); z-index: 100; box-shadow: 0 0 15px currentColor; border-color: white; background: rgba(10,5,0,0.9); }
    .map-location.visited { border-color: #8cb87a; }
    .map-location.current { border: 2px solid #ffd700; z-index: 200; box-shadow: 0 0 18px #ffd700,0 0 40px #ff8c00; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 10px #ffd700} 50%{box-shadow:0 0 25px #ff8c00} }
    .loc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.4); }
    .loc-name { font-size: 9px; color: #ddd; font-weight: bold; text-shadow: 0 0 2px black; }
    .info-panel { flex: 1; min-width: 300px; max-width: 400px; display: flex; flex-direction: column; gap: 3px; }
    .status-bar { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; background: #150a04; border: 2px solid #7a5535; border-radius: 15px; padding: 3px 7px; color: #ffd699; font-weight: bold; font-size: 0.55rem; background: linear-gradient(180deg, #241408 0%, #0a0401 100%); gap: 3px; }
    .stat { display: flex; align-items: center; gap: 1px; }
    .rep-badges { display: flex; gap: 2px; flex-wrap: wrap; }
    .rep-badge { padding: 1px 4px; border-radius: 6px; font-size: 0.42rem; border: 1px solid; }
    .location-info-box { background: #150a04; border: 2px solid #5a3a20; border-radius: 10px; padding: 5px 8px; font-size: 0.5rem; color: #c9a063; }
    .location-name-display { font-size: 0.65rem; font-weight: bold; color: #ffd699; }
    .location-desc { font-size: 0.48rem; color: #a08060; margin-top: 2px; font-style: italic; }
    .npc-box { background: #1a0e04; border: 2px solid #4a3a5a; border-radius: 10px; padding: 5px 8px; font-size: 0.48rem; color: #b89ad8; }
    .npc-name { font-size: 0.55rem; font-weight: bold; color: #d4b8e8; }
    .npc-desc { font-size: 0.42rem; color: #9a8ac8; margin-top: 2px; }
    .npc-reaction { font-size: 0.42rem; color: #c9a063; margin-top: 2px; font-style: italic; }
    .parchment { background: #e0ccaa; color: #1a0c04; border-radius: 8px; border: 2px solid #a08060; padding: 6px 8px; line-height: 1.25; min-height: 28px; font-size: 0.62rem; font-weight: bold; white-space: pre-wrap; word-break: break-word; max-height: 85px; overflow-y: auto; }
    .narrator-text { color: #6b4423; font-style: italic; font-weight: normal; font-size: 0.52rem; display: block; margin-top: 2px; padding-top: 2px; border-top: 1px dashed #c9a063; }
    .appearance-text { color: #8a5a6a; font-size: 0.48rem; font-style: italic; display: block; margin-top: 1px; }
    .action-result-text { color: #4a6a2a; font-size: 0.5rem; display: block; margin-top: 1px; }
    .equip-bar { display: flex; flex-wrap: wrap; gap: 2px; background: #150a04; border: 1px solid #5a3a20; border-radius: 8px; padding: 2px; font-size: 0.45rem; justify-content: center; }
    .equip-slot { background: #1e1006; border: 1px solid #3a2010; border-radius: 5px; padding: 1px 3px; text-align: center; cursor: pointer; min-width: 35px; }
    .equip-slot:hover { border-color: #c9a050; }
    .equip-slot-name { font-size: 0.32rem; color: #7a5535; }
    .equip-slot-item { font-size: 0.45rem; font-weight: bold; }
    .section-label { color: #c9a063; font-size: 0.45rem; margin: 2px 0 1px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px dashed #7a5535; padding-bottom: 1px; font-weight: bold; }
    .btn-grid { display: flex; flex-wrap: wrap; gap: 1px; margin: 1px 0; justify-content: center; }
    .btn { background: #3a2012; border: 1px solid #b89050; color: #f5dba6; font-family: 'Georgia', serif; font-weight: bold; font-size: 0.42rem; padding: 2px 3px; border-radius: 4px; cursor: pointer; background: linear-gradient(180deg, #4e3020 0%, #201008 100%); box-shadow: 0 1px 0 #2a1808; transition: 0.05s; flex: 1 1 auto; min-width: 30px; text-align: center; }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.4; pointer-events: none; cursor: not-allowed; }
    .btn-combat { background: linear-gradient(180deg, #5a2a2a 0%, #2a1010 100%); border-color: #c87070; }
    .btn-shop { background: linear-gradient(180deg, #2a4a2a 0%, #1a2a1a 100%); border-color: #70c870; }
    .reset-btn { background: #4a2a18; border: 2px solid #d4a565; padding: 2px 7px; font-size: 0.48rem; cursor: pointer; border-radius: 8px; color: #ffefd0; }
    .flex-center { display: flex; justify-content: center; margin-top: 2px; gap: 3px; flex-wrap: wrap; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 500; }
    .modal-content { background: #1e1006; border: 3px solid #9a7050; border-radius: 12px; padding: 8px; max-width: 480px; width: 92%; color: #e8d5b5; box-shadow: 0 15px 30px black; max-height: 75vh; overflow-y: auto; font-size: 0.52rem; }
    .modal-item { padding: 2px 4px; border-bottom: 1px solid #4a3018; display: flex; justify-content: space-between; align-items: center; gap: 2px; flex-wrap: wrap; }
    .equip-btn { background: #4a7a3a; border: 1px solid #7ab86a; color: white; padding: 1px 3px; border-radius: 3px; cursor: pointer; font-size: 0.38rem; }
    .unequip-btn { background: #7a3a3a; border: 1px solid #b86a6a; color: white; padding: 1px 3px; border-radius: 3px; cursor: pointer; font-size: 0.38rem; }
    .sell-btn { background: #7a6a2a; border: 1px solid #c8b868; color: white; padding: 1px 3px; border-radius: 3px; cursor: pointer; font-size: 0.38rem; }
    .decompose-btn { background: #4a6a6a; border: 1px solid #88b8c8; color: white; padding: 1px 3px; border-radius: 3px; cursor: pointer; font-size: 0.38rem; }
    .trait-btn { background: #5a4a7a; border: 1px solid #9a8ac8; color: white; padding: 1px 4px; border-radius: 3px; cursor: pointer; font-size: 0.38rem; }
    .confirm-btn { background: #7a4a3a; border: 2px solid #d88888; color: white; padding: 2px 7px; border-radius: 5px; cursor: pointer; font-size: 0.44rem; margin: 2px; }
    .cancel-btn { background: #3a5a3a; border: 2px solid #88d888; color: white; padding: 2px 7px; border-radius: 5px; cursor: pointer; font-size: 0.44rem; margin: 2px; }
    .close-modal { background: #5a3a20; border: 2px solid #d4a565; color: white; padding: 2px 8px; border-radius: 6px; cursor: pointer; margin-top: 5px; font-weight: bold; }
    .rc{color:#aaa}.ru{color:#8cff8c}.rr{color:#5c9cff}.re{color:#c05cff}.rl{color:#ff8c00}
    .legend { position: absolute; bottom: 6px; left: 6px; z-index: 300; background: rgba(0,0,0,0.85); border: 1px solid #5a3a20; border-radius: 6px; padding: 2px 6px; font-size: 7px; display: flex; flex-wrap: wrap; gap: 4px; }
    .legend-item { display: flex; align-items: center; gap: 1px; }
    .legend-dot { width: 5px; height: 5px; border-radius: 50%; }
    @media(max-width:900px){.main-layout{flex-direction:column}.map-panel{height:360px;min-width:300px}.info-panel{max-width:none}}
  </style>
</head>
<body>
<div class="game-container">
  <div class="main-layout">
    <div class="map-panel" id="mapPanel"><div class="map-container" id="mapContainer"><div class="map-inner" id="mapInner"></div></div>
      <div class="legend"><span style="color:#fff;">图例:</span><span class="legend-item"><span class="legend-dot" style="background:#e0b870;"></span>城镇</span><span class="legend-item"><span class="legend-dot" style="background:#6ab86a;"></span>森林</span><span class="legend-item"><span class="legend-dot" style="background:#c9a0a0;"></span>山脉</span><span class="legend-item"><span class="legend-dot" style="background:#a080c0;"></span>地下城</span><span class="legend-item"><span class="legend-dot" style="background:#c0b080;"></span>遗迹</span><span class="legend-item"><span class="legend-dot" style="background:#c080c0;"></span>特殊</span><span class="legend-item"><span class="legend-dot" style="background:#80a080;"></span>营地</span><span class="legend-item"><span style="color:#ffd700;">★</span>当前位置</span></div>
    </div>
    <div class="info-panel">
      <div class="status-bar">
        <span class="stat">❤️<span id="hpD">25</span></span><span class="stat">⚔️<span id="atkD">5</span></span><span class="stat">🛡️<span id="defD">2</span></span><span class="stat">🍀<span id="luckD">2</span></span><span class="stat">💰<span id="goldD">15</span></span><span class="stat">✨Lv<span id="lvlD">1</span></span>
        <div class="rep-badges">
          <span class="rep-badge" style="background:#3a2a00;border-color:#e0b870;color:#e0b870;" id="repKingdom">🏰陌生人</span>
          <span class="rep-badge" style="background:#2a002a;border-color:#c080c0;color:#c080c0;" id="repMystic">🔮外来者</span>
        </div>
      </div>
      <div class="location-info-box">
        <div class="location-name-display" id="locNameDisplay">🏰王都格兰威尔</div>
        <div class="location-desc" id="locDescDisplay">大陆最大的王国首都。</div>
      </div>
      <div class="npc-box" id="npcBox">
        <div class="npc-name" id="npcName">👤镇长·埃德温</div>
        <div class="npc-desc" id="npcDesc">一位白发苍苍的老者，负责管理镇上的事务。</div>
        <div class="npc-reaction" id="npcReaction">他看了你一眼，微微点头。</div>
      </div>
      <div class="equip-bar" id="equipBar"></div>
      <div class="parchment" id="story"></div>
      <div id="buildActions"></div>
      <div class="flex-center">
        <button class="btn" onclick="oB()">🎒背包</button>
        <button class="btn" onclick="oC()">👤角色</button>
        <button class="btn" onclick="oT()">🌟特质</button>
        <button class="reset-btn" id="resetB">✨重启</button>
      </div>
    </div>
  </div>
</div>
<div class="modal" id="bagM"><div class="modal-content"><h3>🎒行囊</h3><div id="bagL"></div><button class="close-modal" onclick="cM('bagM')">关闭</button></div></div>
<div class="modal" id="charM"><div class="modal-content"><h3>👤角色详情</h3><div id="charI"></div><button class="close-modal" onclick="cM('charM')">关闭</button></div></div>
<div class="modal" id="traitM"><div class="modal-content"><h3>🌟特质与专精</h3><div id="traitI"></div><button class="close-modal" onclick="cM('traitM')">关闭</button></div></div>
<div class="modal" id="confirmM"><div class="modal-content" style="text-align:center;"><h3>⚠️确认重启</h3><p>确定吗？</p><div><button class="confirm-btn" id="confirmReset">✅确认</button><button class="cancel-btn" onclick="cM('confirmM')">❌取消</button></div></div></div>

<script>
(()=>{
  // ========== NPC系统（150个地点各至少1个NPC） ==========
  const NPC_DATABASE = {
    // 城镇NPC
    granville:[{name:'公会会长·雷纳德',desc:'冒险者公会的负责人，经验丰富的老战士。',reactions:{default:'打量着你，评估着你的实力。',friendly:'热情地拍了拍你的肩膀。',respected:'恭敬地向你行礼。',unfriendly:'皱了皱眉，似乎有些怀疑。'}}],
    silverport:[{name:'船长·玛丽娜',desc:'一位常年出海的女船长，皮肤被海风吹得黝黑。',reactions:{default:'靠在船舷上看着你。',friendly:'邀请你上船喝一杯。',respected:'向你讲述远方的见闻。'}}],
    ironforge:[{name:'铁匠大师·巴林',desc:'矮人族最出色的铁匠之一，胡子上沾满了火星。',reactions:{default:'专注地敲打着铁砧。',friendly:'停下手中的活计与你交谈。',respected:'拿出珍藏的矿石给你看。'}}],
    moonbrook:[{name:'月光祭司·艾琳',desc:'守护月光石矿的年轻女祭司。',reactions:{default:'静静站在月光下祈祷。',friendly:'微笑着向你介绍月光石的传说。',respected:'为你施展月光祝福。'}}],
    sunspire:[{name:'圣骑士团长·奥德里克',desc:'身穿金色铠甲的高大骑士，正义的化身。',reactions:{default:'用锐利的目光审视着你。',friendly:'点头认可你的存在。',respected:'邀请你加入骑士团的训练。'}}],
    thornwall:[{name:'玫瑰骑士·伊莎贝尔',desc:'荆棘墙堡的女指挥官，美丽而致命。',reactions:{default:'手握剑柄警惕地看着你。',friendly:'摘下头盔露出微笑。',respected:'与你讨论边境防御策略。'}}],
    goldfield:[{name:'农夫·托马斯',desc:'金田村最勤劳的农夫，双手布满老茧。',reactions:{default:'在田间忙碌着。',friendly:'递给你一个新鲜的面包。',respected:'分享他今年的丰收计划。'}}],
    shadowmere:[{name:'暗影商人·维克多',desc:'穿着黑色斗篷的神秘商人，经营着特殊商品。',reactions:{default:'在阴影中默默观察你。',friendly:'掀开斗篷露出一抹神秘的微笑。',respected:'为你展示他的珍藏品。'}}],
    crossroads:[{name:'旅店老板·玛莎',desc:'十字路口旅店的老板娘，消息灵通。',reactions:{default:'擦拭着吧台，随意地看了你一眼。',friendly:'热情地为你斟满酒杯。',respected:'附耳告诉你一个秘密消息。'}}],
    oldtown:[{name:'历史学者·阿尔伯特',desc:'研究古代历史的学者，戴着厚厚的眼镜。',reactions:{default:'埋头在古籍中。',friendly:'抬起头与你讨论历史。',respected:'展示他最新的考古发现。'}}],
    // 森林NPC
    elderwood:[{name:'精灵长老·艾尔文',desc:'千年古树的守护者，眼中闪烁着智慧的光芒。',reactions:{default:'安静地坐在古树下冥想。',friendly:'睁开眼睛向你微笑。',respected:'为你讲述精灵族的古老传说。'}}],
    whispergrove:[{name:'德鲁伊·莫拉',desc:'与自然融为一体的德鲁伊，身上缠绕着藤蔓。',reactions:{default:'与林间的动物低语。',friendly:'呼唤一只小鸟落在你的肩头。',respected:'传授你与自然沟通的方法。'}}],
    shadowfen:[{name:'沼泽向导·格鲁姆',desc:'熟悉暗影沼泽每一个角落的老猎人。',reactions:{default:'警惕地握着长矛。',friendly:'警告你沼泽中的危险区域。',respected:'带你前往沼泽深处的秘密地点。'}}],
    emeraldglade:[{name:'精灵舞者·莉亚',desc:'翡翠空地上最优雅的精灵舞者。',reactions:{default:'在草地间轻盈地舞动。',friendly:'向你伸出手邀请共舞。',respected:'为你跳一支祝福之舞。'}}],
    fairyring:[{name:'妖精女王·蒂娜',desc:'只有手掌大小的妖精女王，翅膀闪烁着星光。',reactions:{default:'在蘑菇上好奇地看着你。',friendly:'飞到你的耳边轻声细语。',respected:'赐予你妖精的祝福粉末。'}}],
    druidcircle:[{name:'大德鲁伊·奥克',desc:'德鲁伊之环的守护者，能与万物交谈。',reactions:{default:'站在石圈中央仰望天空。',friendly:'用低沉的声音欢迎你。',respected:'让你触摸古老的德鲁伊石碑。'}}],
    // 山脉NPC
    dwarvenhold:[{name:'矮人国王·索林',desc:'矮人要塞的统治者，手持巨大的战锤。',reactions:{default:'坐在王座上审视着你。',friendly:'邀请你参加矮人的宴会。',respected:'为你打造一件专属装备。'}}],
    dragonpeak:[{name:'龙语者·瑟拉',desc:'能与龙族交流的稀有血脉拥有者。',reactions:{default:'眺望着远方的龙峰。',friendly:'向你讲述龙族的故事。',respected:'教你一句简单的龙语。'}}],
    // 地下城NPC
    darkmere:[{name:'探险家·达里安',desc:'在地下城入口徘徊的探险家，装备精良。',reactions:{default:'检查着自己的装备。',friendly:'与你分享地下城的探索经验。',respected:'邀请你一起深入地下城。'}}],
    // 遗迹NPC
    starlibrary:[{name:'星之守护者·阿斯特拉',desc:'星空图书馆的管理员，身穿绣满星辰的长袍。',reactions:{default:'在书架间静静穿行。',friendly:'为你推荐一本古籍。',respected:'打开封印的魔法书给你阅读。'}}],
    // 特殊地点NPC
    celestialpeak:[{name:'天使·加百列',desc:'天界峰的守护天使，散发着圣洁的光芒。',reactions:{default:'在高处静静注视着你。',friendly:'展开洁白的羽翼。',respected:'赐予你天界的祝福之光。'}}],
    // 营地NPC
    adventurercamp1:[{name:'冒险者·杰克',desc:'一位年轻的冒险者，正在篝火旁烤着肉。',reactions:{default:'专注地翻转着烤肉。',friendly:'递给你一串刚烤好的肉。',respected:'向你请教战斗技巧。'}}],
  };

  // 通用NPC模板（没有特定NPC的地点使用）
  const GENERIC_NPCS = {
    town:[{name:'镇长',desc:'负责管理镇上的事务。'},{name:'守卫队长',desc:'维护镇上秩序的卫兵队长。'},{name:'商人',desc:'经营着镇上最大的商铺。'}],
    forest:[{name:'猎人',desc:'在森林中狩猎为生的老猎人。'},{name:'采集者',desc:'在林中采集药草和蘑菇。'}],
    mountain:[{name:'矿工',desc:'在山中挖掘矿石的矿工。'},{name:'登山者',desc:'挑战高峰的勇敢登山者。'}],
    dungeon:[{name:'探险者',desc:'深入地下城寻找宝藏的探险者。'}],
    ruins:[{name:'考古学家',desc:'研究古代遗迹的学者。'},{name:'寻宝者',desc:'在废墟中搜寻宝物的冒险者。'}],
    special:[{name:'神秘人',desc:'身份不明的神秘人物。'}],
    camp:[{name:'冒险者',desc:'在营地中休息的冒险者。'},{name:'厨师',desc:'为营地准备食物的厨师。'}],
  };

  function getNPCForLocation(locId){
    if(NPC_DATABASE[locId])return NPC_DATABASE[locId][Math.floor(Math.random()*NPC_DATABASE[locId].length)];
    const loc=LOC[locId];const pool=GENERIC_NPCS[loc.r]||GENERIC_NPCS['camp'];

  function getNPCReaction(npc,repLevel){
    const repName=repLevel.name;
    if(repName.includes('英雄')||repName.includes('贤者')||repName.includes('勇士')||repName.includes('启灵者')||repName.includes('共鸣者'))return npc.reactions?.respected||'尊敬地看着你。';
    if(repName.includes('友人')||repName.includes('受尊敬')||repName.includes('访客')||repName.includes('感应者'))return npc.reactions?.friendly||'友好地与你交谈。';
    if(repName.includes('陌生')||repName.includes('外来者')||repName.includes('默默无闻'))return npc.reactions?.default||'打量着你。';
    return npc.reactions?.unfriendly||'警惕地看着你。';
  }

  function getAppearanceNPCBonus(){
    let bonus=0;const desc=getAppearanceDesc();
    if(desc.includes('重甲')||desc.includes('板甲'))bonus+=1;
    if(desc.includes('王冠'))bonus+=2;
    if(desc.includes('长袍')||desc.includes('贤者'))bonus+=1;
    if(desc.includes('龙鳞')||desc.includes('龙心'))bonus+=2;
    if(desc.includes('面具'))bonus-=1;
    return bonus;
  }

  window.sFB=function(idx){const item=S.inv[idx];if(item&&item.slot){S.gold+=RAR[item.rarity]?.sell||5;S.inv.splice(idx,1);addStory('出售装备。');upd();cM('bagM');}};
  window.dFB=function(idx){const item=S.inv[idx];if(item&&item.slot){const c=RAR[item.rarity]?.mats||1;for(let i=0;i<c;i++)S.inv.push({name:['铁矿石','银矿石','魔法水晶'][rand(0,2)],type:'material'});S.inv.splice(idx,1);addStory('分解获得材料。');upd();cM('bagM');}};
  window.oC=function(){const i=document.getElementById('charI');let h=`<p>❤️${S.hp}/${S.maxHp} ⚔️${S.atk}(基${S.baseAtk}) 🛡️${S.def}(基${S.baseDef}) 🍀${S.luck} 💰${S.gold} Lv.${S.lvl}</p>`;const kr=getRepLevel('kingdom'),mr=getRepLevel('mystic');h+=`<p>🏰王国：<span style="color:${kr.color}">${kr.name}</span> 🔮神秘：<span style="color:${mr.color}">${mr.name}</span></p>`;if(S.talent)h+=`<p>🎖️天赋：${S.talent.icon}${S.talent.name} - ${S.talent.desc}</p>`;if(S.traits.length>0){h+=`<p>🌟特质：`;S.traits.forEach(tid=>{const tr=TRAITS.find(x=>x.id===tid);if(tr)h+=`<span style="color:#b89ad8;">${tr.icon}${tr.name} </span>`;});h+='</p>';}h+=`<p>🌟特质点数：<b>${S.traitPoints}</b></p><p>👤外观：${getAppearanceDesc()}</p><hr><p><b>装备：</b></p>`;['weapon','armor','helmet','ring','amulet'].forEach(s=>{const eq=S.eq[s];h+=`<p>${s}:${eq?`<span class="${RAR[eq.rarity]?.c||''}">${eq.fullName}${eqStat(eq)}</span>`:'空'}`;if(eq)h+=`<button class="unequip-btn" onclick="uS('${s}')">卸下</button>`;});i.innerHTML=h;document.getElementById('charM').style.display='flex';};
  window.uS=function(s){unequip(s);addStory('卸下装备。外观恢复了。');upd();cM('charM');renderBuildActions();};
  window.oT=function(){const i=document.getElementById('traitI');let h=`<p>🌟可用特质点数：<b>${S.traitPoints}</b></p><hr>`;TRAITS.forEach(tr=>{const owned=S.traits.includes(tr.id);h+=`<div class="modal-item"><span>${tr.icon}${tr.name}<small>(${tr.desc})</small></span><span>${tr.cost}点</span>`;if(owned)h+=`<span style="color:#8cff8c;">已习得</span>`;else if(S.traitPoints>=tr.cost)h+=`<button class="trait-btn" onclick="lT('${tr.id}')">学习</button>`;else h+=`<span style="color:#ff6b6b;">不足</span>`;h+='</div>';});i.innerHTML=h;document.getElementById('traitM').style.display='flex';};
  window.lT=function(tid){learnTrait(tid);upd();window.oT();window.oC();};
  window.cM=function(id){document.getElementById(id).style.display='none';};
  document.querySelectorAll('.modal').forEach(m=>{m.addEventListener('click',function(e){if(e.target===this)cM(this.id);});});

  function reset(){S.baseHp=25;S.maxHp=25;S.hp=25;S.baseAtk=5;S.baseDef=2;S.baseLuck=2;S.atk=5;S.def=2;S.luck=2;S.gold=15;S.lvl=1;S.exp=0;S.expNeeded=40;S.loc='granville';S.visited=new Set(['granville']);S.inv=[];S.eq={weapon:null,armor:null,helmet:null,ring:null,amulet:null};S.cd={};S.flags={};S.critRate=5;S.critDmg=1.5;S.dodge=5;S.talent=assignTalent();S.traits=[];S.traitPoints=0;S.elemAffinity=null;S.elemBonus=0;S.lifesteal=0;S.combatRegen=0;S.goldMul=0;S.expMul=0;S.reputation={kingdom:0,mystic:0};S.weather='☀️晴朗';S.time='🌅清晨';S.dayCount=1;S.stepsToday=0;recalc();document.getElementById('locNameDisplay').textContent='🏰王都格兰威尔';document.getElementById('locDescDisplay').textContent='大陆最大的王国首都。';upd();updateNPCBox();addStory('命运重启！🗺️','新的冒险开始了。');renderMap();renderBuildActions();document.querySelectorAll('.btn').forEach(b=>b.disabled=false);}
  document.getElementById('resetB').addEventListener('click',()=>{document.getElementById('confirmM').style.display='flex';});
  document.getElementById('confirmReset').addEventListener('click',()=>{cM('confirmM');reset();});

  S.talent=assignTalent();recalc();
  document.getElementById('locNameDisplay').textContent='🏰王都格兰威尔';
  document.getElementById('locDescDisplay').textContent='大陆最大的王国首都，冒险者公会的总部所在地。';
  upd();updateNPCBox();
  addStory('欢迎来到艾尔德兰大陆！🗺️','第一章：王都的召唤。','每个地点都有独特的NPC，你的外观会影响他们对你的态度。');
  renderMap();renderBuildActions();
})();
</script>
</body>
</html>
